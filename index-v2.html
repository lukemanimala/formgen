<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandala Maker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --surface-active: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text-primary: rgba(255, 255, 255, 0.9);
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent-hue: 15;
      --accent: hsl(var(--accent-hue), 85%, 55%);
      --accent-dim: hsl(var(--accent-hue), 85%, 25%);
    }

    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Left Panel - Controls */
    .control-panel {
      width: 320px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .panel-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .panel-header p {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .control-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }

    /* Pattern Selector */
    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .pattern-btn {
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .pattern-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .pattern-btn.active {
      background: var(--surface-active);
      border-color: var(--accent);
      color: var(--text-primary);
    }

    /* Knob Controls - Ableton/Serum Style */
    .knob-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
    }

    .knob-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 64px;
    }

    .knob-container {
      position: relative;
      width: 48px;
      height: 48px;
      cursor: pointer;
    }

    .knob-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-135deg);
    }

    .knob-track {
      fill: none;
      stroke: var(--surface-active);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .knob-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s ease;
    }

    .knob-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .knob-indicator {
      width: 2px;
      height: 10px;
      background: var(--text-primary);
      border-radius: 1px;
      transform-origin: bottom center;
      position: absolute;
      top: 4px;
    }

    .knob-container:hover .knob-center {
      border-color: var(--accent);
    }

    .knob-container:active .knob-center {
      background: var(--surface-hover);
    }

    .knob-name {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .knob-value {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      text-align: center;
      margin-top: 2px;
    }

    /* Bipolar knob (center = zero) */
    .knob-control.bipolar .knob-fill {
      stroke: var(--accent);
    }

    /* Large knob variant */
    .knob-control.large .knob-container {
      width: 56px;
      height: 56px;
    }

    .knob-control.large .knob-center {
      width: 32px;
      height: 32px;
    }

    /* Legacy slider styles for fallback */
    .macro-slider {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--surface-active);
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      display: none;
    }

    /* Color Control */
    .color-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .color-preview {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent);
      border: 1px solid var(--border);
    }

    .hue-slider {
      flex: 1;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(to right,
        hsl(0, 85%, 55%),
        hsl(30, 85%, 55%),
        hsl(60, 85%, 55%),
        hsl(90, 85%, 55%),
        hsl(120, 85%, 55%),
        hsl(150, 85%, 55%),
        hsl(180, 85%, 55%),
        hsl(210, 85%, 55%),
        hsl(240, 85%, 55%),
        hsl(270, 85%, 55%),
        hsl(300, 85%, 55%),
        hsl(330, 85%, 55%),
        hsl(360, 85%, 55%)
      );
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .hue-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 28px;
      border-radius: 4px;
      background: white;
      border: 2px solid rgba(0,0,0,0.3);
      cursor: pointer;
    }

    /* Animation Controls */
    .animation-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .anim-btn {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .anim-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .anim-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .lfo-control {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .lfo-select {
      flex: 1;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .lfo-viz-container {
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      display: none;
    }

    .lfo-viz-container.visible {
      display: block;
    }

    #lfo-viz {
      width: 100%;
      height: 40px;
      display: block;
    }

    /* Export Buttons */
    .export-row {
      display: flex;
      gap: 8px;
    }

    .export-btn {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .export-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    /* Canvas Area */
    .canvas-area {
      flex: 1;
      position: relative;
      background: var(--bg-primary);
    }

    #mandala-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-active);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    /* Navigation Cube */
    .nav-cube-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 120px;
      height: 120px;
      perspective: 300px;
      z-index: 100;
    }

    /* Arrow buttons for 90° rotations */
    .nav-arrow {
      position: absolute;
      width: 0;
      height: 0;
      cursor: pointer;
      transition: all 0.15s ease;
      opacity: 0.4;
    }

    .nav-arrow:hover {
      opacity: 1;
    }

    .nav-arrow.up {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid var(--text-secondary);
    }

    .nav-arrow.up:hover {
      border-bottom-color: var(--accent);
    }

    .nav-arrow.down {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 12px solid var(--text-secondary);
    }

    .nav-arrow.down:hover {
      border-top-color: var(--accent);
    }

    .nav-arrow.left {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-right: 12px solid var(--text-secondary);
    }

    .nav-arrow.left:hover {
      border-right-color: var(--accent);
    }

    .nav-arrow.right {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 12px solid var(--text-secondary);
    }

    .nav-arrow.right:hover {
      border-left-color: var(--accent);
    }

    .nav-cube {
      width: 70px;
      height: 70px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
      margin-left: -35px;
      margin-top: -35px;
    }

    .nav-cube-face {
      position: absolute;
      width: 70px;
      height: 70px;
      left: 0;
      top: 0;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      backface-visibility: hidden;
      user-select: none;
    }

    .nav-cube-face:hover {
      background: #252525;
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .nav-cube-face.front  { transform: translateZ(35px); }
    .nav-cube-face.back   { transform: rotateY(180deg) translateZ(35px); }
    .nav-cube-face.right  { transform: rotateY(90deg) translateZ(35px); }
    .nav-cube-face.left   { transform: rotateY(-90deg) translateZ(35px); }
    .nav-cube-face.top    { transform: rotateX(90deg) translateZ(35px); }
    .nav-cube-face.bottom { transform: rotateX(-90deg) translateZ(35px); }

    /* Cube edge buttons */
    .nav-cube-edge {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s ease;
      z-index: 1;
    }

    .nav-cube-edge:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Reset view button */
    .reset-view-btn {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .reset-view-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    /* Drag hint */
    .drag-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-tertiary);
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .drag-hint.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="control-panel">
      <div class="panel-header">
        <h1>Mandala Maker</h1>
        <p>Generative patterns</p>
      </div>

      <!-- Pattern Selection -->
      <div class="control-section">
        <div class="section-label">Pattern</div>
        <div class="pattern-grid">
          <button class="pattern-btn" data-pattern="spiral">Spiral</button>
          <button class="pattern-btn active" data-pattern="mandala">Mandala</button>
          <button class="pattern-btn" data-pattern="star">Star</button>
          <button class="pattern-btn" data-pattern="rosette">Rosette</button>
          <button class="pattern-btn" data-pattern="flower">Flower</button>
          <button class="pattern-btn" data-pattern="spirograph">Spirograph</button>
        </div>
      </div>

      <!-- Macro Controls -->
      <div class="control-section">
        <div class="section-label">Macros</div>
        <div class="knob-row">
          <div class="knob-control" data-param="complexity" data-min="0" data-max="1" data-value="0.5">
            <div class="knob-container"></div>
            <div class="knob-name">Layers</div>
            <div class="knob-value">0.50</div>
          </div>
          <div class="knob-control" data-param="evolution" data-min="0" data-max="1" data-value="0.3">
            <div class="knob-container"></div>
            <div class="knob-name">Twist</div>
            <div class="knob-value">0.30</div>
          </div>
          <div class="knob-control" data-param="dimension" data-min="0" data-max="1" data-value="0.4">
            <div class="knob-container"></div>
            <div class="knob-name">Dimension</div>
            <div class="knob-value">0.40</div>
          </div>
          <div class="knob-control" data-param="energy" data-min="0" data-max="1" data-value="0.6">
            <div class="knob-container"></div>
            <div class="knob-name">Energy</div>
            <div class="knob-value">0.60</div>
          </div>
        </div>
      </div>

      <!-- Geometry -->
      <div class="control-section">
        <div class="section-label">Geometry</div>
        <div class="knob-row">
          <div class="knob-control" data-param="petals" data-min="3" data-max="16" data-value="6" data-step="1" data-format="int">
            <div class="knob-container"></div>
            <div class="knob-name">Petals</div>
            <div class="knob-value">6</div>
          </div>
          <div class="knob-control" data-param="concavity" data-min="0" data-max="1" data-value="0.5">
            <div class="knob-container"></div>
            <div class="knob-name">Concavity</div>
            <div class="knob-value">0.50</div>
          </div>
          <div class="knob-control" data-param="pointiness" data-min="0.2" data-max="3" data-value="1">
            <div class="knob-container"></div>
            <div class="knob-name">Pointy</div>
            <div class="knob-value">1.00</div>
          </div>
          <div class="knob-control" data-param="innerRadius" data-min="0.05" data-max="0.8" data-value="0.3">
            <div class="knob-container"></div>
            <div class="knob-name">Inner R</div>
            <div class="knob-value">0.30</div>
          </div>
        </div>
        <div class="knob-row" style="margin-top: 12px;">
          <div class="knob-control" data-param="petalChange" data-min="-1" data-max="1" data-value="0" data-bipolar="true">
            <div class="knob-container"></div>
            <div class="knob-name">Petal Chg</div>
            <div class="knob-value">0.00</div>
          </div>
        </div>
        <div class="knob-row" style="margin-top: 12px;">
          <div class="knob-control" data-param="rotation" data-min="0" data-max="360" data-value="0" data-step="1" data-format="deg" data-wrap="true">
            <div class="knob-container"></div>
            <div class="knob-name">Rotation</div>
            <div class="knob-value">0°</div>
          </div>
          <div class="knob-control" data-param="height" data-min="0" data-max="4" data-value="2">
            <div class="knob-container"></div>
            <div class="knob-name">Height</div>
            <div class="knob-value">2.00</div>
          </div>
        </div>
      </div>

      <!-- Color -->
      <div class="control-section">
        <div class="section-label">Color</div>
        <div class="color-row">
          <div class="color-preview" id="color-preview"></div>
          <input type="range" class="hue-slider" id="hue" min="0" max="360" value="15">
        </div>
      </div>

      <!-- Animation -->
      <div class="control-section">
        <div class="section-label">Animation</div>
        <div class="animation-row">
          <button class="anim-btn" id="play-btn">Play</button>
          <button class="anim-btn" id="stop-btn">Stop</button>
          <button class="anim-btn" id="twist-btn">Twist</button>
        </div>
        <div class="knob-row" style="margin: 12px 0;">
          <div class="knob-control" data-param="animSpeed" data-min="0.1" data-max="3" data-value="1">
            <div class="knob-container"></div>
            <div class="knob-name">Speed</div>
            <div class="knob-value">1.00</div>
          </div>
          <div class="knob-control" data-param="twistSpins" data-min="1" data-max="10" data-value="3" data-step="1" data-format="int">
            <div class="knob-container"></div>
            <div class="knob-name">Spins</div>
            <div class="knob-value">3</div>
          </div>
          <div class="knob-control" data-param="twistStagger" data-min="5" data-max="200" data-value="20" data-step="1" data-format="int">
            <div class="knob-container"></div>
            <div class="knob-name">Stagger</div>
            <div class="knob-value">20</div>
          </div>
        </div>
        <div class="lfo-control">
          <select class="lfo-select" id="lfo-target">
            <option value="none">No LFO</option>
            <option value="complexity">Layers</option>
            <option value="evolution">Twist</option>
            <option value="dimension">Dimension</option>
            <option value="energy">Energy</option>
            <option value="hue">Hue</option>
            <option value="petals">Petals</option>
            <option value="concavity">Concavity</option>
            <option value="pointiness">Pointiness</option>
            <option value="petalChange">Petal Change</option>
            <option value="innerRadius">Inner Radius</option>
            <option value="rotation">Rotation</option>
            <option value="height">Height</option>
          </select>
          <select class="lfo-select" id="lfo-shape">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="saw">Saw</option>
          </select>
        </div>
        <div class="lfo-viz-container">
          <canvas id="lfo-viz" width="200" height="40"></canvas>
        </div>
      </div>

      <!-- Export -->
      <div class="control-section">
        <div class="section-label">Export</div>
        <div class="export-row">
          <button class="export-btn" id="export-png">PNG</button>
          <button class="export-btn" id="export-svg">SVG</button>
        </div>
        <div class="export-row" style="margin-top: 8px;">
          <button class="export-btn" id="copy-config">Copy Config</button>
          <button class="export-btn" id="load-config">Load Config</button>
        </div>
      </div>
    </div>

    <div class="canvas-area">
      <canvas id="mandala-canvas"></canvas>

      <!-- Navigation Cube -->
      <div class="nav-cube-container">
        <!-- Arrow buttons -->
        <div class="nav-arrow up" data-rotate="up"></div>
        <div class="nav-arrow down" data-rotate="down"></div>
        <div class="nav-arrow left" data-rotate="left"></div>
        <div class="nav-arrow right" data-rotate="right"></div>
        <!-- 3D Cube -->
        <div class="nav-cube" id="nav-cube">
          <div class="nav-cube-face front" data-view="front">Front</div>
          <div class="nav-cube-face back" data-view="back">Back</div>
          <div class="nav-cube-face right" data-view="right">Right</div>
          <div class="nav-cube-face left" data-view="left">Left</div>
          <div class="nav-cube-face top" data-view="top">Top</div>
          <div class="nav-cube-face bottom" data-view="bottom">Bottom</div>
        </div>
        <button class="reset-view-btn" id="reset-view">Reset</button>
      </div>

      <div class="drag-hint" id="drag-hint">Drag to rotate</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

    // ===================
    // MACRO CONFIGURATION
    // ===================

    const macros = {
      complexity: 0.5,   // Layer count, segment count
      evolution: 0.3,    // Twist, rotation variation
      dimension: 0.4,    // Z-spacing, perspective
      energy: 0.6,       // Color saturation, line thickness
    };

    let currentHue = 15;
    let currentPattern = 'mandala';
    let isAnimating = false;
    let lfoTarget = 'none';
    let lfoShape = 'sine';

    // Animation state
    let animSpeed = 1.0;    // 0.1 to 3.0
    let twistSpins = 3;     // number of full rotations per layer
    let twistStagger = 20;  // milliseconds between each layer starting
    let twistAnimating = false;
    let twistStartTime = 0;
    const twistBaseDuration = 2.5;  // base duration for each layer's animation

    // Ease-in-out cubic
    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // Geometry controls
    const geometry = {
      petals: 6,
      concavity: 0.5,
      pointiness: 1,   // 0.2-3, controls sharpness of petal tips
      petalChange: 0,  // -1 to 1, how petals evolve from outer to inner
      innerRadius: 0.3,
      rotation: 0,  // degrees, 0-360 with wrap
      height: 2,    // total Z-height of the stack
    };

    // Expand macros to full configuration
    function expandMacros() {
      const c = macros.complexity;
      const ev = macros.evolution;
      const d = macros.dimension;
      const en = macros.energy;

      // Calculate layers and spacing
      const layers = Math.floor(6 + c * 18);      // 6-24 layers
      const totalHeight = geometry.height;         // From height knob
      const layerSpacing = layers > 1 ? totalHeight / (layers - 1) : 0;

      return {
        // From Complexity (Layers)
        layers,
        segments: Math.floor(3 + c * 9),          // 3-12 segments (for rosette/flower)
        pointsPerCorner: Math.floor(4 + c * 8),   // Smoothness

        // From Evolution (Twist)
        totalTwist: -0.3 - ev * 1.2,              // -0.3 to -1.5 radians
        radiusChange: 0.1 + ev * 0.5,             // Corner radius evolution

        // From Dimension
        layerSpacing,                             // Calculated from height / layers
        perspectiveTilt: d * 0.8,                 // Y-axis tilt

        // From Energy
        saturation: 60 + en * 35,                 // 60-95%
        lineWidthOuter: 2 + en * 3,               // 2-5
        lineWidthInner: 0.5 + en * 1.5,           // 0.5-2
        fillOpacity: 0.04 + en * 0.08,            // 0.04-0.12

        // Fixed
        baseRadius: 2.2,
        cornerRadius: 0.04,

        // From Geometry controls
        petals: geometry.petals,
        concavity: geometry.concavity,
        pointiness: geometry.pointiness,  // 0.2-3, sharpness of tips
        petalChange: geometry.petalChange,  // -1 to 1
        innerRadiusRatio: geometry.innerRadius,
        rotationDeg: geometry.rotation,  // degrees
        rotationRad: geometry.rotation * Math.PI / 180,  // radians
        totalHeight: geometry.height,
      };
    }

    // ===================
    // PATTERN GENERATORS
    // ===================

    function generateSpiralGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const innerRadius = config.baseRadius * config.innerRadiusRatio;
      const radius = config.baseRadius - progress * (config.baseRadius - innerRadius);
      const rotation = progress * config.totalTwist;
      const z = layerIndex * config.layerSpacing;
      const cornerRadius = getLayerCornerRadius(progress, config);

      return {
        vertices: getTriangleVertices(radius, rotation, z, cornerRadius, config),
        z
      };
    }

    function generateRosetteGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const z = layerIndex * config.layerSpacing;

      // Use geometry controls
      const petals = config.petals;
      const concavity = config.concavity;
      const pointiness = config.pointiness;

      const outerRadius = config.baseRadius * (1 - progress * (1 - config.innerRadiusRatio));
      const depth = 0.3 + concavity * 0.5;  // How deep the rosette curves

      const rotation = config.rotationRad + progress * config.totalTwist;

      const vertices = [];
      const pointsPerPetal = 20;
      const totalPoints = petals * pointsPerPetal;

      for (let i = 0; i <= totalPoints; i++) {
        const t = i / totalPoints;
        const angle = rotation + t * Math.PI * 2;

        // Rosette formula: modulated radius with pointiness
        const rawMod = Math.cos(petals * angle);
        const modulation = Math.sign(rawMod) * Math.pow(Math.abs(rawMod), 1 / pointiness);
        const r = outerRadius * (1 - depth + depth * (modulation + 1) / 2);

        vertices.push(new THREE.Vector3(
          r * Math.cos(angle),
          r * Math.sin(angle),
          z
        ));
      }

      return { vertices, z };
    }

    function generateFlowerGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const z = layerIndex * config.layerSpacing;

      // Use geometry controls
      const petals = config.petals;
      const concavity = config.concavity;
      const pointiness = config.pointiness;

      const radius = config.baseRadius * (1 - progress * (1 - config.innerRadiusRatio));
      const rotation = config.rotationRad + progress * config.totalTwist * 0.5;

      const vertices = [];
      const points = petals * 20;

      for (let i = 0; i <= points; i++) {
        const t = (i / points) * Math.PI * 2;
        const angle = t + rotation;

        // Rose curve: r = cos(k * theta), modified by concavity and pointiness
        const roseValue = Math.cos(petals * t / 2);
        const sharpened = Math.pow(Math.abs(roseValue), 1 / pointiness);
        const r = radius * (sharpened * (0.5 + concavity * 0.5) + (1 - concavity) * 0.3);

        vertices.push(new THREE.Vector3(
          r * Math.cos(angle),
          r * Math.sin(angle),
          z
        ));
      }

      return { vertices, z };
    }

    function generateSpirographGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const z = layerIndex * config.layerSpacing;

      // Use geometry controls
      const k = config.petals;  // Number of cusps
      const penDistance = 0.3 + config.concavity * 0.7;  // Concavity affects pen distance

      // Rotation from slider (degrees converted to radians) + layer twist
      const baseRotation = config.rotationRad;
      const layerTwist = progress * config.totalTwist;
      const totalRotation = baseRotation + layerTwist;

      // Spirograph (hypotrochoid) parameters
      const scale = config.baseRadius * (1 - progress * (1 - config.innerRadiusRatio));
      const R = scale;
      const r = R / k;
      const d = r * penDistance;

      const vertices = [];
      const rotations = k;
      const points = 50 * rotations;

      for (let i = 0; i <= points; i++) {
        const t = (i / points) * Math.PI * 2 * rotations;
        const x = (R - r) * Math.cos(t) + d * Math.cos((R - r) / r * t);
        const y = (R - r) * Math.sin(t) - d * Math.sin((R - r) / r * t);

        // Apply total rotation (base + layer twist)
        const cos = Math.cos(totalRotation);
        const sin = Math.sin(totalRotation);
        vertices.push(new THREE.Vector3(
          x * cos - y * sin,
          x * sin + y * cos,
          z
        ));
      }

      return { vertices, z };
    }

    // Helper: Sample a cubic Bezier curve
    function sampleBezier(p0, p1, p2, p3, t) {
      const mt = 1 - t;
      const mt2 = mt * mt;
      const mt3 = mt2 * mt;
      const t2 = t * t;
      const t3 = t2 * t;
      return {
        x: mt3 * p0.x + 3 * mt2 * t * p1.x + 3 * mt * t2 * p2.x + t3 * p3.x,
        y: mt3 * p0.y + 3 * mt2 * t * p1.y + 3 * mt * t2 * p2.y + t3 * p3.y
      };
    }

    function generateMandalaGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const z = layerIndex * config.layerSpacing;

      // Use geometry controls
      const basePetals = config.petals;
      const concavity = config.concavity;
      const pointiness = config.pointiness;
      const petalChange = config.petalChange;

      // Petal count can change across layers
      const petalMultiplier = 1 + petalChange * progress;
      const numPetals = Math.max(3, Math.round(basePetals * petalMultiplier));

      // Petal dimensions - shrink toward center
      const baseRadius = config.baseRadius * (1 - progress * (1 - config.innerRadiusRatio));
      const petalWidth = baseRadius * 0.4;
      const petalHeight = baseRadius * (0.5 + pointiness * 0.5);  // Pointiness affects length

      // Concavity controls how much the sides bulge (-1 = concave, 0 = straight, 1 = convex)
      const curve = petalWidth * (0.5 + concavity * 0.5);

      // Alternating rotation for interlocking layers
      const baseRotation = config.rotationRad + progress * config.totalTwist;
      const alternateOffset = (layerIndex % 2) * (Math.PI / numPetals);

      const vertices = [];
      const samplesPerCurve = 10;

      // Draw each petal using Bezier curves (like original mandala-renderer)
      for (let p = 0; p < numPetals; p++) {
        const petalAngle = baseRotation + alternateOffset + (p / numPetals) * Math.PI * 2;
        const cos = Math.cos(petalAngle);
        const sin = Math.sin(petalAngle);

        // Petal shape in local coords (pointing up along Y):
        // Start at origin (0,0), curve out to tip (0, petalHeight), back to origin

        // Left edge: two Bezier segments for smooth curve
        // Segment 1: (0,0) -> (-curve, height*0.5)
        const leftSeg1 = [
          { x: 0, y: 0 },
          { x: -curve * 0.7, y: petalHeight * 0.15 },
          { x: -curve, y: petalHeight * 0.35 },
          { x: -curve, y: petalHeight * 0.5 }
        ];

        // Segment 2: (-curve, height*0.5) -> (0, height)
        const leftSeg2 = [
          { x: -curve, y: petalHeight * 0.5 },
          { x: -curve, y: petalHeight * 0.65 },
          { x: -curve * 0.7, y: petalHeight * 0.85 },
          { x: 0, y: petalHeight }
        ];

        // Right edge: mirror (tip back to origin)
        const rightSeg1 = [
          { x: 0, y: petalHeight },
          { x: curve * 0.7, y: petalHeight * 0.85 },
          { x: curve, y: petalHeight * 0.65 },
          { x: curve, y: petalHeight * 0.5 }
        ];

        const rightSeg2 = [
          { x: curve, y: petalHeight * 0.5 },
          { x: curve, y: petalHeight * 0.35 },
          { x: curve * 0.7, y: petalHeight * 0.15 },
          { x: 0, y: 0 }
        ];

        // Sample all segments and rotate to petal angle
        const segments = [leftSeg1, leftSeg2, rightSeg1, rightSeg2];

        for (const seg of segments) {
          for (let i = 0; i <= samplesPerCurve; i++) {
            const t = i / samplesPerCurve;
            const pt = sampleBezier(seg[0], seg[1], seg[2], seg[3], t);

            // Rotate point by petal angle
            const rx = pt.x * cos - pt.y * sin;
            const ry = pt.x * sin + pt.y * cos;

            vertices.push(new THREE.Vector3(rx, ry, z));
          }
        }
      }

      // Close the shape
      if (vertices.length > 0) {
        vertices.push(vertices[0].clone());
      }

      return { vertices, z };
    }

    function generateStarGeometry(config, layerIndex, totalLayers) {
      const progress = layerIndex / (totalLayers - 1);
      const z = layerIndex * config.layerSpacing;

      // Use geometry controls
      const numPoints = config.petals;
      const concavity = config.concavity;
      const pointiness = config.pointiness;

      // Radius shrinks toward center
      const outerRadius = config.baseRadius * (1 - progress * (1 - config.innerRadiusRatio));

      // Inner radius based on concavity (0 = polygon, 1 = deep star)
      const innerRadius = outerRadius * (1 - concavity * 0.85);

      // Alternating rotation for interlocking stars
      const baseRotation = config.rotationRad + progress * config.totalTwist;
      const alternateOffset = (layerIndex % 2) * (Math.PI / numPoints);
      const rotation = baseRotation + alternateOffset - Math.PI / 2;

      const vertices = [];
      const samplesPerPoint = 8;  // More samples for smooth curves

      for (let p = 0; p < numPoints; p++) {
        // Each point goes: inner -> outer tip -> inner
        for (let i = 0; i <= samplesPerPoint; i++) {
          const t = i / samplesPerPoint;
          const baseAngle = rotation + (p / numPoints) * Math.PI * 2;
          const nextAngle = rotation + ((p + 1) / numPoints) * Math.PI * 2;
          const angle = baseAngle + t * (nextAngle - baseAngle);

          // Shape curve: inner -> outer -> inner with pointiness
          const tipPhase = t * Math.PI * 2;
          const rawShape = (1 + Math.cos(tipPhase - Math.PI)) / 2;
          const shape = Math.pow(rawShape, pointiness);
          const r = innerRadius + (outerRadius - innerRadius) * shape;

          vertices.push(new THREE.Vector3(
            r * Math.cos(angle),
            r * Math.sin(angle),
            z
          ));
        }
      }

      // Close the shape
      vertices.push(vertices[0].clone());

      return { vertices, z };
    }

    // Helper: Triangle with rounded corners (from logo animation)
    function getTriangleVertices(radius, rotation, z, cornerRadius, config) {
      if (cornerRadius <= 0.001) {
        const vertices = [];
        for (let i = 0; i < 3; i++) {
          const angle = rotation + (i * Math.PI * 2 / 3) - Math.PI / 2;
          vertices.push(new THREE.Vector3(
            radius * Math.cos(angle),
            radius * Math.sin(angle),
            z
          ));
        }
        vertices.push(vertices[0].clone());
        return vertices;
      }

      const vertices = [];
      const corners = [];

      for (let i = 0; i < 3; i++) {
        const angle = rotation + (i * Math.PI * 2 / 3) - Math.PI / 2;
        corners.push({
          x: radius * Math.cos(angle),
          y: radius * Math.sin(angle),
          angle
        });
      }

      const actualCornerRadius = Math.min(cornerRadius * radius, radius * 0.45);

      for (let i = 0; i < 3; i++) {
        const curr = corners[i];
        const next = corners[(i + 1) % 3];
        const prev = corners[(i + 2) % 3];

        const toPrev = { x: prev.x - curr.x, y: prev.y - curr.y };
        const toNext = { x: next.x - curr.x, y: next.y - curr.y };

        const lenPrev = Math.sqrt(toPrev.x ** 2 + toPrev.y ** 2);
        const lenNext = Math.sqrt(toNext.x ** 2 + toNext.y ** 2);
        toPrev.x /= lenPrev; toPrev.y /= lenPrev;
        toNext.x /= lenNext; toNext.y /= lenNext;

        const bisector = { x: toPrev.x + toNext.x, y: toPrev.y + toNext.y };
        const bisectorLen = Math.sqrt(bisector.x ** 2 + bisector.y ** 2);
        if (bisectorLen > 0.001) {
          bisector.x /= bisectorLen;
          bisector.y /= bisectorLen;
        }

        const halfAngle = Math.acos(Math.max(-1, Math.min(1, toPrev.x * toNext.x + toPrev.y * toNext.y))) / 2;
        const insetDist = actualCornerRadius / Math.sin(halfAngle);

        const arcCenter = {
          x: curr.x + bisector.x * insetDist,
          y: curr.y + bisector.y * insetDist
        };

        const arcStart = {
          x: curr.x + toPrev.x * actualCornerRadius,
          y: curr.y + toPrev.y * actualCornerRadius
        };
        const arcEnd = {
          x: curr.x + toNext.x * actualCornerRadius,
          y: curr.y + toNext.y * actualCornerRadius
        };

        const startAngle = Math.atan2(arcStart.y - arcCenter.y, arcStart.x - arcCenter.x);
        const endAngle = Math.atan2(arcEnd.y - arcCenter.y, arcEnd.x - arcCenter.x);

        let angleDiff = endAngle - startAngle;
        if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        const arcRadius = actualCornerRadius / Math.tan(halfAngle);

        for (let j = 0; j <= config.pointsPerCorner; j++) {
          const t = j / config.pointsPerCorner;
          const angle = startAngle + angleDiff * t;
          vertices.push(new THREE.Vector3(
            arcCenter.x + Math.cos(angle) * arcRadius,
            arcCenter.y + Math.sin(angle) * arcRadius,
            z
          ));
        }
      }

      vertices.push(vertices[0].clone());
      return vertices;
    }

    function getLayerCornerRadius(progress, config) {
      const base = config.cornerRadius;
      const change = config.radiusChange;
      return base + (change * progress * (0.8 - base));
    }

    // ===================
    // COLOR FUNCTIONS
    // ===================

    function hslToThreeColor(h, s, l) {
      const color = new THREE.Color();
      color.setHSL(h / 360, s / 100, l / 100);
      return color;
    }

    function getLayerColors(progress, config) {
      const h = currentHue;
      const s = config.saturation;

      // Line colors: dark outer, bright inner
      const lineL = 22 + progress * 38;
      const lineColor = hslToThreeColor(h, s, lineL);

      // Fill colors: darker
      const fillL = 15 + progress * 7;
      const fillColor = hslToThreeColor(h, s * 0.9, fillL);

      return { lineColor, fillColor };
    }

    // ===================
    // RENDERER
    // ===================

    class MandalaRenderer {
      constructor(canvas) {
        this.canvas = canvas;
        this.width = canvas.parentElement.clientWidth;
        this.height = canvas.parentElement.clientHeight;

        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, this.width / this.height, 0.1, 100);
        this.camera.position.set(0, 0, 6);
        this.camera.lookAt(0, 0, 0);

        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        this.renderer.setSize(this.width, this.height);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.setClearColor(0x0a0a0a, 1);

        this.container = new THREE.Group();
        this.scene.add(this.container);

        this.layers = [];
        this.time = 0;

        // Orbit control state
        this.isDragging = false;
        this.previousMousePosition = { x: 0, y: 0 };
        // Start with front view
        this.targetRotation = { x: 0, y: 0 };
        this.currentRotation = { x: 0, y: 0 };
        this.rotationSpeed = 0.005;

        this.handleResize = this.handleResize.bind(this);
        window.addEventListener('resize', this.handleResize);

        this.initOrbitControls();
        this.initNavCube();
      }

      initOrbitControls() {
        const canvas = this.canvas;
        const dragHint = document.getElementById('drag-hint');
        let hintShown = false;

        canvas.addEventListener('mousedown', (e) => {
          this.isDragging = true;
          this.previousMousePosition = { x: e.clientX, y: e.clientY };
          canvas.style.cursor = 'grabbing';
        });

        canvas.addEventListener('mousemove', (e) => {
          // Show hint on first hover
          if (!hintShown) {
            dragHint.classList.add('visible');
            setTimeout(() => dragHint.classList.remove('visible'), 2000);
            hintShown = true;
          }

          if (!this.isDragging) return;

          const deltaX = e.clientX - this.previousMousePosition.x;
          const deltaY = e.clientY - this.previousMousePosition.y;

          this.targetRotation.y += deltaX * this.rotationSpeed;
          this.targetRotation.x += deltaY * this.rotationSpeed;

          // Clamp vertical rotation
          this.targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.targetRotation.x));

          this.previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mouseup', () => {
          this.isDragging = false;
          canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('mouseleave', () => {
          this.isDragging = false;
          canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('mouseenter', () => {
          canvas.style.cursor = 'grab';
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        canvas.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;
          e.preventDefault();

          const deltaX = e.touches[0].clientX - this.previousMousePosition.x;
          const deltaY = e.touches[0].clientY - this.previousMousePosition.y;

          this.targetRotation.y += deltaX * this.rotationSpeed;
          this.targetRotation.x += deltaY * this.rotationSpeed;
          this.targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.targetRotation.x));

          this.previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        canvas.addEventListener('touchend', () => {
          this.isDragging = false;
        });

        // Scroll to zoom
        canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          const zoomSpeed = 0.001;
          this.camera.position.z += e.deltaY * zoomSpeed * this.camera.position.z;
          this.camera.position.z = Math.max(3, Math.min(15, this.camera.position.z));
        }, { passive: false });
      }

      initNavCube() {
        const navCube = document.getElementById('nav-cube');
        const faces = document.querySelectorAll('.nav-cube-face');
        const arrows = document.querySelectorAll('.nav-arrow');
        const resetBtn = document.getElementById('reset-view');

        // Standard view angles
        const views = {
          'front':  { x: 0, y: 0 },
          'back':   { x: 0, y: Math.PI },
          'right':  { x: 0, y: -Math.PI / 2 },
          'left':   { x: 0, y: Math.PI / 2 },
          'top':    { x: -Math.PI / 2, y: 0 },
          'bottom': { x: Math.PI / 2, y: 0 },
        };

        // Click handlers for faces (snap to view)
        faces.forEach(face => {
          face.addEventListener('click', () => {
            const viewName = face.dataset.view;
            const view = views[viewName];
            if (view) {
              this.targetRotation.x = view.x;
              this.targetRotation.y = view.y;
            }
          });
        });

        // Click handlers for arrows (45° rotations)
        const QUARTER_PI = Math.PI / 4;
        arrows.forEach(arrow => {
          arrow.addEventListener('click', () => {
            const direction = arrow.dataset.rotate;
            switch (direction) {
              case 'up':
                this.targetRotation.x -= QUARTER_PI;
                break;
              case 'down':
                this.targetRotation.x += QUARTER_PI;
                break;
              case 'left':
                this.targetRotation.y += QUARTER_PI;
                break;
              case 'right':
                this.targetRotation.y -= QUARTER_PI;
                break;
            }
            // Clamp vertical rotation
            this.targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.targetRotation.x));
          });
        });

        // Reset button
        resetBtn.addEventListener('click', () => {
          this.targetRotation.x = 0;
          this.targetRotation.y = 0;
          this.camera.position.z = 6;
        });

        this.navCube = navCube;
      }

      updateNavCube() {
        if (!this.navCube) return;
        // Sync nav cube rotation with model rotation (inverted for visual match)
        const rotX = -this.currentRotation.x * (180 / Math.PI);
        const rotY = -this.currentRotation.y * (180 / Math.PI);
        this.navCube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
      }

      handleResize() {
        this.width = this.canvas.parentElement.clientWidth;
        this.height = this.canvas.parentElement.clientHeight;
        this.camera.aspect = this.width / this.height;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(this.width, this.height);

        this.layers.forEach(layer => {
          layer.lineMaterial.resolution.set(this.width, this.height);
        });
      }

      clearLayers() {
        this.layers.forEach(layer => {
          this.container.remove(layer.group);
          layer.lineGeometry.dispose();
          layer.lineMaterial.dispose();
          layer.fillGeometry.dispose();
          layer.fillMaterial.dispose();
        });
        this.layers = [];
      }

      generate() {
        this.clearLayers();

        const config = expandMacros();
        const generator = {
          spiral: generateSpiralGeometry,
          mandala: generateMandalaGeometry,
          star: generateStarGeometry,
          rosette: generateRosetteGeometry,
          flower: generateFlowerGeometry,
          spirograph: generateSpirographGeometry,
        }[currentPattern];

        for (let i = 0; i < config.layers; i++) {
          const progress = i / (config.layers - 1);
          const { vertices, z } = generator(config, i, config.layers);
          const layer = this.createLayer(vertices, z, progress, config);
          this.layers.push(layer);
          this.container.add(layer.group);
        }

        // Center the stack
        const totalDepth = config.layers * config.layerSpacing;
        this.container.position.z = -totalDepth / 2;
      }

      createLayer(vertices, z, progress, config) {
        const positions = [];
        vertices.forEach(v => positions.push(v.x, v.y, v.z));

        const lineGeometry = new LineGeometry();
        lineGeometry.setPositions(positions);

        const lineWidth = config.lineWidthOuter + progress * (config.lineWidthInner - config.lineWidthOuter);
        const { lineColor, fillColor } = getLayerColors(progress, config);

        const lineMaterial = new LineMaterial({
          color: lineColor,
          linewidth: lineWidth,
          resolution: new THREE.Vector2(this.width, this.height),
        });

        const line = new Line2(lineGeometry, lineMaterial);

        // Create fill
        const shape = new THREE.Shape();
        shape.moveTo(vertices[0].x, vertices[0].y);
        for (let i = 1; i < vertices.length; i++) {
          shape.lineTo(vertices[i].x, vertices[i].y);
        }
        shape.closePath();

        const fillGeometry = new THREE.ShapeGeometry(shape);
        const fillMaterial = new THREE.MeshBasicMaterial({
          color: fillColor,
          transparent: true,
          opacity: config.fillOpacity,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });

        const fill = new THREE.Mesh(fillGeometry, fillMaterial);
        fill.position.z = z;

        const group = new THREE.Group();
        group.add(fill);
        group.add(line);

        return {
          group,
          line,
          fill,
          lineGeometry,
          lineMaterial,
          fillGeometry,
          fillMaterial,
          progress,
        };
      }

      updateColors() {
        const config = expandMacros();
        this.layers.forEach(layer => {
          const { lineColor, fillColor } = getLayerColors(layer.progress, config);
          layer.lineMaterial.color = lineColor;
          layer.fillMaterial.color = fillColor;
        });
      }

      animate(timestamp) {
        this.time = timestamp * 0.001;

        // Smooth rotation interpolation (orbit controls)
        const lerpFactor = 0.1;
        this.currentRotation.x += (this.targetRotation.x - this.currentRotation.x) * lerpFactor;
        this.currentRotation.y += (this.targetRotation.y - this.currentRotation.y) * lerpFactor;

        // Apply orbit rotation to container
        this.container.rotation.x = this.currentRotation.x;
        this.container.rotation.y = this.currentRotation.y;

        // Update nav cube to match
        this.updateNavCube();

        // Cascading twist animation (per-layer staggered barrel rolls)
        if (twistAnimating && this.layers.length > 0) {
          const elapsed = this.time - twistStartTime;
          const layerDuration = twistBaseDuration / animSpeed;
          // Stagger in seconds (convert from ms)
          const staggerSec = twistStagger / 1000;

          let allComplete = true;

          // Animate each layer with staggered timing (in milliseconds)
          this.layers.forEach((layer, i) => {
            // Outer layers (lower index) start first, inner layers follow
            const staggerDelay = i * staggerSec;
            const layerElapsed = Math.max(0, elapsed - staggerDelay);
            const layerProgress = Math.min(layerElapsed / layerDuration, 1);

            if (layerProgress < 1) allComplete = false;

            const easedProgress = easeInOutCubic(layerProgress);

            // Multiple full spins (twistSpins * 360°)
            const totalRotation = twistSpins * Math.PI * 2;
            layer.group.rotation.z = easedProgress * totalRotation;
          });

          // Stop when all layers complete
          if (allComplete) {
            twistAnimating = false;
            document.getElementById('twist-btn').classList.remove('active');
            // Reset layer rotations (they've done full rotations, so visually same)
            this.layers.forEach(layer => {
              layer.group.rotation.z = 0;
            });
          }
        }

        // LFO modulation
        if (lfoTarget !== 'none' && isAnimating) {
          const freq = 0.3 * animSpeed;
          const t = this.time * freq * Math.PI * 2;
          const phase = (this.time * freq) % 1;

          let lfoValue;
          switch (lfoShape) {
            case 'sine':
              lfoValue = (Math.sin(t) + 1) / 2;
              break;
            case 'triangle':
              lfoValue = Math.abs(phase * 2 - 1);
              break;
            case 'saw':
              lfoValue = phase;
              break;
          }

          // Apply to correct parameter object and update knob/slider
          let actualValue;
          let needsRegenerate = true;

          if (lfoTarget === 'hue') {
            // Hue: 0-360
            actualValue = lfoValue * 360;
            currentHue = actualValue;
            document.getElementById('hue').value = actualValue;
            updateColorPreview();
            this.updateColors();
            needsRegenerate = false;  // Color update doesn't need full regenerate
          } else if (['petals', 'concavity', 'pointiness', 'innerRadius', 'rotation', 'petalChange', 'height'].includes(lfoTarget)) {
            // Geometry parameters - map lfoValue (0-1) to parameter range
            if (lfoTarget === 'petals') {
              actualValue = Math.round(3 + lfoValue * 13);  // 3-16
            } else if (lfoTarget === 'innerRadius') {
              actualValue = 0.05 + lfoValue * 0.75;
            } else if (lfoTarget === 'rotation') {
              actualValue = lfoValue * 360;
            } else if (lfoTarget === 'petalChange') {
              actualValue = (lfoValue - 0.5) * 2;  // Map 0-1 to -1 to 1
            } else if (lfoTarget === 'height') {
              actualValue = lfoValue * 4;  // 0-4
            } else if (lfoTarget === 'pointiness') {
              actualValue = 0.2 + lfoValue * 2.8;  // 0.2-3
            } else {
              actualValue = lfoValue;
            }
            geometry[lfoTarget] = actualValue;
          } else {
            // Macro parameters
            actualValue = lfoValue;
            macros[lfoTarget] = actualValue;
          }

          // Update knob visual
          if (lfoTarget !== 'hue' && typeof updateKnobValue === 'function') {
            updateKnobValue(lfoTarget, actualValue);
          }

          // Regenerate geometry (smooth - every frame)
          if (needsRegenerate) {
            this.generate();
          }

          // Update LFO visualization
          drawLfoViz(phase, lfoValue);
        }

        this.renderer.render(this.scene, this.camera);
        requestAnimationFrame(this.animate.bind(this));
      }

      exportPNG() {
        // Render at high resolution
        const scale = 4;
        const w = this.width * scale;
        const h = this.height * scale;

        this.renderer.setSize(w, h);
        this.layers.forEach(layer => {
          layer.lineMaterial.resolution.set(w, h);
        });

        this.renderer.render(this.scene, this.camera);

        const link = document.createElement('a');
        link.download = 'mandala.png';
        link.href = this.renderer.domElement.toDataURL('image/png');
        link.click();

        // Restore
        this.handleResize();
      }
    }

    // ===================
    // UI BINDINGS
    // ===================

    function updateMacroDisplay(name, value) {
      const display = document.getElementById(`${name}-value`);
      if (display) display.textContent = value.toFixed(2);

      const slider = document.getElementById(name);
      if (slider && slider.value != value) slider.value = value;
    }

    function updateColorPreview() {
      const preview = document.getElementById('color-preview');
      preview.style.background = `hsl(${currentHue}, 85%, 55%)`;
      document.documentElement.style.setProperty('--accent-hue', currentHue);
    }

    // ===================
    // KNOB COMPONENT
    // ===================

    class Knob {
      constructor(element, onChange) {
        this.element = element;
        this.container = element.querySelector('.knob-container');
        this.valueDisplay = element.querySelector('.knob-value');
        this.onChange = onChange;

        this.param = element.dataset.param;
        this.min = parseFloat(element.dataset.min) || 0;
        this.max = parseFloat(element.dataset.max) || 1;
        this.value = parseFloat(element.dataset.value) || 0;
        this.step = parseFloat(element.dataset.step) || 0.01;
        this.format = element.dataset.format || 'float';
        this.bipolar = element.dataset.bipolar === 'true';
        this.wrap = element.dataset.wrap === 'true';

        this.isDragging = false;
        this.startY = 0;
        this.startValue = 0;

        this.render();
        this.bindEvents();
      }

      render() {
        const size = 48;
        const strokeWidth = 4;
        const radius = (size - strokeWidth) / 2;
        const circumference = radius * Math.PI * 1.5; // 270 degrees

        this.container.innerHTML = `
          <svg class="knob-svg" viewBox="0 0 ${size} ${size}">
            <circle class="knob-track" cx="${size/2}" cy="${size/2}" r="${radius}"
              stroke-dasharray="${circumference}" stroke-dashoffset="0"
              transform="rotate(135 ${size/2} ${size/2})"/>
            <circle class="knob-fill" cx="${size/2}" cy="${size/2}" r="${radius}"
              stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
              transform="rotate(135 ${size/2} ${size/2})"/>
          </svg>
          <div class="knob-center">
            <div class="knob-indicator"></div>
          </div>
        `;

        this.trackCircle = this.container.querySelector('.knob-track');
        this.fillCircle = this.container.querySelector('.knob-fill');
        this.indicator = this.container.querySelector('.knob-indicator');
        this.circumference = circumference;

        this.updateVisual();
      }

      getNormalizedValue() {
        return (this.value - this.min) / (this.max - this.min);
      }

      updateVisual() {
        const norm = this.getNormalizedValue();

        if (this.bipolar) {
          // Bipolar: center is zero, fill goes left or right
          const centerNorm = (0 - this.min) / (this.max - this.min);
          const fillStart = Math.min(norm, centerNorm);
          const fillEnd = Math.max(norm, centerNorm);
          const fillAmount = fillEnd - fillStart;

          // Offset to start from center
          const startOffset = this.circumference * (1 - centerNorm);
          const fillLength = this.circumference * fillAmount;

          this.fillCircle.style.strokeDashoffset = startOffset;
          this.fillCircle.style.strokeDasharray = `${fillLength} ${this.circumference}`;
        } else {
          // Unipolar: fill from start
          const offset = this.circumference * (1 - norm);
          this.fillCircle.style.strokeDashoffset = offset;
          this.fillCircle.style.strokeDasharray = this.circumference;
        }

        // Rotate indicator (270 degree range, starting at -135)
        const angle = -135 + norm * 270;
        this.indicator.style.transform = `rotate(${angle}deg)`;

        // Update value display
        this.updateValueDisplay();
      }

      updateValueDisplay() {
        let displayValue;
        if (this.format === 'int') {
          displayValue = Math.round(this.value).toString();
        } else if (this.format === 'deg') {
          displayValue = `${Math.round(this.value)}°`;
        } else {
          displayValue = this.value.toFixed(2);
        }
        this.valueDisplay.textContent = displayValue;
      }

      setValue(value, triggerChange = true) {
        if (this.wrap) {
          // Wrap around (for rotation)
          value = ((value - this.min) % (this.max - this.min) + (this.max - this.min)) % (this.max - this.min) + this.min;
        } else {
          value = Math.max(this.min, Math.min(this.max, value));
        }

        // Apply step
        if (this.step >= 1) {
          value = Math.round(value / this.step) * this.step;
        }

        this.value = value;
        this.element.dataset.value = value;
        this.updateVisual();

        if (triggerChange && this.onChange) {
          this.onChange(this.param, this.value);
        }
      }

      bindEvents() {
        // Mouse drag
        this.container.addEventListener('mousedown', (e) => {
          this.isDragging = true;
          this.startY = e.clientY;
          this.startValue = this.value;
          document.body.style.cursor = 'ns-resize';
          e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
          if (!this.isDragging) return;

          const deltaY = this.startY - e.clientY;
          const range = this.max - this.min;
          const sensitivity = range / 150; // pixels to full range

          let newValue = this.startValue + deltaY * sensitivity;
          this.setValue(newValue);
        });

        document.addEventListener('mouseup', () => {
          this.isDragging = false;
          document.body.style.cursor = '';
        });

        // Mouse wheel
        this.container.addEventListener('wheel', (e) => {
          e.preventDefault();
          const delta = e.deltaY > 0 ? -1 : 1;
          const range = this.max - this.min;
          const increment = this.step >= 1 ? this.step : range / 100;
          this.setValue(this.value + delta * increment);
        }, { passive: false });

        // Double-click/tap to reset to 0 (or min if 0 is out of range)
        const resetKnob = () => {
          const resetValue = (0 >= this.min && 0 <= this.max) ? 0 : this.min;
          this.setValue(resetValue);
        };

        this.container.addEventListener('dblclick', resetKnob);

        // Touch double-tap support
        let lastTap = 0;
        this.container.addEventListener('touchend', (e) => {
          const now = Date.now();
          if (now - lastTap < 300) {
            e.preventDefault();
            resetKnob();
            lastTap = 0;
          } else {
            lastTap = now;
          }
        });

        // Touch support
        this.container.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.startY = e.touches[0].clientY;
          this.startValue = this.value;
          e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;

          const deltaY = this.startY - e.touches[0].clientY;
          const range = this.max - this.min;
          const sensitivity = range / 150;

          let newValue = this.startValue + deltaY * sensitivity;
          this.setValue(newValue);
        }, { passive: false });

        document.addEventListener('touchend', () => {
          this.isDragging = false;
        });
      }
    }

    // Store knob instances for LFO updates
    const knobs = {};

    function initKnobs(renderer) {
      document.querySelectorAll('.knob-control').forEach(el => {
        const param = el.dataset.param;

        const knob = new Knob(el, (param, value) => {
          // Update the appropriate state object
          if (['complexity', 'evolution', 'dimension', 'energy'].includes(param)) {
            macros[param] = value;
            renderer.generate();
          } else if (param === 'animSpeed') {
            animSpeed = value;
          } else if (param === 'twistSpins') {
            twistSpins = Math.round(value);
          } else if (param === 'twistStagger') {
            twistStagger = Math.round(value);
          } else if (param in geometry) {
            geometry[param] = value;
            renderer.generate();
          }
        });

        knobs[param] = knob;
      });
    }

    // Update knob from external source (LFO)
    function updateKnobValue(param, value) {
      if (knobs[param]) {
        knobs[param].setValue(value, false);
      }
    }

    // ===================
    // LFO VISUALIZATION
    // ===================

    const lfoVizCanvas = document.getElementById('lfo-viz');
    const lfoVizCtx = lfoVizCanvas.getContext('2d');
    const lfoVizContainer = document.querySelector('.lfo-viz-container');

    function drawLfoViz(phase, currentValue) {
      const w = lfoVizCanvas.width;
      const h = lfoVizCanvas.height;
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

      lfoVizCtx.clearRect(0, 0, w, h);

      // Draw waveform
      lfoVizCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
      lfoVizCtx.lineWidth = 1;
      lfoVizCtx.beginPath();

      for (let x = 0; x < w; x++) {
        const t = x / w;
        let y;

        switch (lfoShape) {
          case 'sine':
            y = (Math.sin(t * Math.PI * 2) + 1) / 2;
            break;
          case 'triangle':
            y = Math.abs(t * 2 - 1);
            break;
          case 'saw':
            y = t;
            break;
        }

        const screenY = h - y * (h - 4) - 2;
        if (x === 0) {
          lfoVizCtx.moveTo(x, screenY);
        } else {
          lfoVizCtx.lineTo(x, screenY);
        }
      }
      lfoVizCtx.stroke();

      // Draw current position marker
      const markerX = phase * w;
      const markerY = h - currentValue * (h - 4) - 2;

      // Vertical line at current position
      lfoVizCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      lfoVizCtx.beginPath();
      lfoVizCtx.moveTo(markerX, 0);
      lfoVizCtx.lineTo(markerX, h);
      lfoVizCtx.stroke();

      // Current value dot
      lfoVizCtx.fillStyle = accent || 'hsl(15, 85%, 55%)';
      lfoVizCtx.beginPath();
      lfoVizCtx.arc(markerX, markerY, 4, 0, Math.PI * 2);
      lfoVizCtx.fill();
    }

    function updateLfoVizVisibility() {
      if (lfoTarget !== 'none') {
        lfoVizContainer.classList.add('visible');
        // Draw initial state
        drawLfoViz(0, 0.5);
      } else {
        lfoVizContainer.classList.remove('visible');
      }
    }

    // ===================
    // INITIALIZE
    // ===================

    const canvas = document.getElementById('mandala-canvas');
    const renderer = new MandalaRenderer(canvas);

    // Initialize knobs
    initKnobs(renderer);

    // Pattern buttons
    document.querySelectorAll('.pattern-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPattern = btn.dataset.pattern;
        renderer.generate();
      });
    });

    // Hue slider
    document.getElementById('hue').addEventListener('input', (e) => {
      currentHue = parseInt(e.target.value);
      updateColorPreview();
      renderer.updateColors();
    });

    // Animation controls
    document.getElementById('play-btn').addEventListener('click', () => {
      isAnimating = true;
      document.getElementById('play-btn').classList.add('active');
      document.getElementById('stop-btn').classList.remove('active');
    });

    document.getElementById('stop-btn').addEventListener('click', () => {
      isAnimating = false;
      document.getElementById('play-btn').classList.remove('active');
      document.getElementById('stop-btn').classList.add('active');
    });

    document.getElementById('twist-btn').addEventListener('click', () => {
      if (!twistAnimating) {
        twistAnimating = true;
        twistStartTime = renderer.time;
        twistStartValue = geometry.rotation;
        document.getElementById('twist-btn').classList.add('active');
      }
    });

    document.getElementById('lfo-target').addEventListener('change', (e) => {
      lfoTarget = e.target.value;
      updateLfoVizVisibility();
    });

    document.getElementById('lfo-shape').addEventListener('change', (e) => {
      lfoShape = e.target.value;
      // Redraw waveform with new shape
      if (lfoTarget !== 'none') {
        drawLfoViz(0, 0.5);
      }
    });

    // Export
    document.getElementById('export-png').addEventListener('click', () => {
      renderer.exportPNG();
    });

    document.getElementById('export-svg').addEventListener('click', () => {
      alert('SVG export coming soon');
    });

    // Copy config to clipboard
    document.getElementById('copy-config').addEventListener('click', () => {
      const config = {
        pattern: currentPattern,
        hue: currentHue,
        macros: { ...macros },
        geometry: { ...geometry },
        animation: {
          speed: animSpeed,
          spins: twistSpins,
          stagger: twistStagger
        }
      };
      const json = JSON.stringify(config, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        const btn = document.getElementById('copy-config');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Config', 1500);
      });
    });

    // Load config from clipboard
    document.getElementById('load-config').addEventListener('click', async () => {
      try {
        const json = await navigator.clipboard.readText();
        const config = JSON.parse(json);

        // Apply pattern
        if (config.pattern) {
          currentPattern = config.pattern;
          document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.pattern === config.pattern);
          });
        }

        // Apply hue
        if (config.hue !== undefined) {
          currentHue = config.hue;
          document.getElementById('hue').value = currentHue;
          updateColorPreview();
        }

        // Apply macros
        if (config.macros) {
          Object.assign(macros, config.macros);
          Object.keys(config.macros).forEach(key => updateKnobValue(key, config.macros[key]));
        }

        // Apply geometry
        if (config.geometry) {
          Object.assign(geometry, config.geometry);
          Object.keys(config.geometry).forEach(key => updateKnobValue(key, config.geometry[key]));
        }

        // Apply animation settings
        if (config.animation) {
          if (config.animation.speed !== undefined) {
            animSpeed = config.animation.speed;
            updateKnobValue('animSpeed', animSpeed);
          }
          if (config.animation.spins !== undefined) {
            twistSpins = config.animation.spins;
            updateKnobValue('twistSpins', twistSpins);
          }
          if (config.animation.stagger !== undefined) {
            twistStagger = config.animation.stagger;
            updateKnobValue('twistStagger', twistStagger);
          }
        }

        renderer.generate();
        renderer.updateColors();

        const btn = document.getElementById('load-config');
        btn.textContent = 'Loaded!';
        setTimeout(() => btn.textContent = 'Load Config', 1500);
      } catch (e) {
        alert('Failed to load config. Make sure valid JSON is in clipboard.');
      }
    });

    // Initial render
    updateColorPreview();
    renderer.generate();
    renderer.animate(0);

    // Auto-play 1 spin on load
    setTimeout(() => {
      twistSpins = 1;
      updateKnobValue('twistSpins', 1);
      twistAnimating = true;
      twistStartTime = renderer.time;
      document.getElementById('twist-btn').classList.add('active');
    }, 500);
  </script>
</body>
